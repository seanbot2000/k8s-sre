apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-pressure
  namespace: default
  labels:
    app: memory-pressure
    component: stress-test
    project: k8s-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-pressure
  template:
    metadata:
      labels:
        app: memory-pressure
        component: stress-test
        project: k8s-sre
    spec:
      nodeSelector:
        kubernetes.azure.com/mode: user
      containers:
        - name: memory-stress
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              echo "Memory pressure pod started"
              while true; do
                echo "[$(date)] Starting memory stress cycle..."
                # Allocate ~512MB by writing to tmpfs-backed /dev/shm
                dd if=/dev/zero of=/dev/shm/stress-block bs=1M count=512 2>/dev/null
                echo "[$(date)] Memory allocated — holding for 60 seconds"
                sleep 60
                # Release memory
                rm -f /dev/shm/stress-block
                echo "[$(date)] Memory released — sleeping 20 minutes"
                sleep 1140
              done
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "200m"
      restartPolicy: Always
